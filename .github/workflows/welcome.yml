name: 🎉 Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 **Halo! Terima kasih sudah membuka issue!**

            Maintainer akan review sesegera mungkin (biasanya 1-7 hari).
            
            Sementara itu:
            - 📖 Cek [dokumentasi](https://github.com/flessan/GDIPS/tree/main/docs)
            - 🔍 Cek apakah [issue serupa sudah ada](https://github.com/flessan/GDIPS/issues?q=is%3Aissue)
            - 💬 Atau tanya di [Discord](https://discord.gg/YyeZ2Sxjgf)

            **Terima kasih sudah peduli terhadap GDIPS!** 💚
          pr-message: |
            🎉 **First PR! Terima kasih sudah berkontribusi!**

            Kami akan review PR-mu secepatnya. Pastikan:
            - ✅ [Checklist di PR template](https://github.com/flessan/GDIPS/blob/main/.github/PULL_REQUEST_TEMPLATE.md) sudah terisi
            - ✅ Kode mengikuti [standar](https://github.com/flessan/GDIPS/blob/main/CONTRIBUTING.md#standar-kode)
            - ✅ Tidak ada conflict dengan `main`

            Punya pertanyaan? [Diskusi di Discord](https://discord.gg/YyeZ2Sxjgf)
            
            **Selamat berkontribusi!** 🚀
